<html>
	<head>
		<title>
			CSS Demo
		</title>
		<!--<link href="main.css" rel="stylesheet">-->
		<style>
			p{
			font-size:200%;
			border-left:20px solid red;
			border-right:20px dashed black;
			border-top:20px double green;
			border-bottom:20px ridge blue;
			border-radius:10px;
			box-shadow: 5px 10px 10px black;
			
			height:100px;
			
			text-align:center;
			font-weight:bold;
			
			text-decoration:underline;
			text-transform:uppercase;
			}
			.p1{
			background-color:rgb(100,25,200);
			color:#E38D13;
			}
			#p2{
			background-color:yellow;
			color:blue;
			}
			
		</style>
	</head>
	<body>
		<p class="p1">  This is a paragraph</p>
		<p id="p2"> This is also a paragraph</p>
		<p style="color:red;">This is paragraph</p>
	</body>
</html>;
